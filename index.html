<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Terminal Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="topbar">
        <div class="logo">QUANTUM<span>PRO</span></div>
        <div class="search-wrapper">
            <input type="text" id="asset-search" placeholder="Search markets (e.g., btc, eur, xau)..." oninput="searchAssets()" autocomplete="off">
            <div id="search-results" class="search-dropdown"></div>
        </div>
        <div class="lang-btns">
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('es')">ES</button>
        </div>
    </nav>

    <main class="terminal-layout">
        
        <aside class="sidebar">
            <div class="ai-widget">
                <div class="ai-header">
                    <span>🧠</span>
                    <strong id="ai-label">AI MARKET SENTIMENT</strong>
                </div>
                <p id="ia-status">Booting neural engine...</p>
            </div>

            <div class="watchlist-header">MARKET WATCH</div>
            <div id="main-dashboard" class="asset-list">
                </div>
        </aside>

        <section class="chart-container">
            <div id="chart-widget"></div>
        </section>

    </main>

    <div id="asset-modal" class="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
